mutation FiefCustomerBulkUpdate(
  $customers: [CustomerBulkUpdateInput!]!
  $errorPolicy: ErrorPolicyEnum
) {
  customerBulkUpdate(customers: $customers, errorPolicy: $errorPolicy) {
    count
    results {
      customer {
        ...FiefCustomer
      }
      errors {
        ...CustomerBulkUpdateError
      }
    }
    errors {
      ...CustomerBulkUpdateError
    }
  }
}
